name: ncti_schedule_client
description: KTI schedule client (Flutter — Android, web, Windows; iOS config-only, macOS/Linux inherited from template).
publish_to: none

version: 1.3.17+1779753600

environment:
  sdk: ^3.6.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  go_router: ^17.2.1
  flutter_riverpod: ^3.3.1
  window_manager: ^0.5.1
  graphql_flutter: ^5.2.1
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^10.0.0
  web: ^1.1.1
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  connectivity_plus: ^6.1.0
  home_widget: ^0.9.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  flex_color_picker: ^3.7.0
  dynamic_color: ^1.7.0
  flutter_html: ^3.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Corben
      fonts:
        - asset: fonts/Corben/Corben-Bold.ttf
          weight: 700
